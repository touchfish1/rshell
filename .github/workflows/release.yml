name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle_pattern: |
              src-tauri/target/release/bundle/**/*.deb
              src-tauri/target/release/bundle/**/*.rpm
              src-tauri/target/release/bundle/**/*.AppImage
              src-tauri/target/release/bundle/**/*.AppImage.tar.gz
          - os: windows-latest
            bundle_pattern: |
              src-tauri/target/release/bundle/**/*.msi
              src-tauri/target/release/bundle/**/*.exe
              src-tauri/target/release/bundle/**/*.msi.zip
              src-tauri/target/release/bundle/**/*.nsis.zip
          - os: macos-latest
            bundle_pattern: |
              src-tauri/target/release/bundle/**/*.dmg
              src-tauri/target/release/bundle/**/*.pkg
              src-tauri/target/release/bundle/**/*.app.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src-tauri/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install UI dependencies
        run: npm ci
        working-directory: src-tauri/ui

      - name: Build Tauri bundles
        run: npx @tauri-apps/cli@2 build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Diagnose updater artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== Diagnose: list src-tauri/target/release/bundle recursively ==="
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem -Recurse "src-tauri/target/release/bundle" -File | Sort-Object FullName | ForEach-Object {
              "{0}  {1} bytes" -f $_.FullName, $_.Length
            }
          } else {
            Write-Host "src-tauri/target/release/bundle does not exist"
          }
          Write-Host ""
          Write-Host "=== Diagnose: search latest*.json and signatures ==="
          if (Test-Path "src-tauri/target/release/bundle") {
            $latest = Get-ChildItem -Recurse "src-tauri/target/release/bundle" -File -Filter "latest*.json" -ErrorAction SilentlyContinue
            if ($latest.Count -eq 0) {
              Write-Host "No latest*.json found under src-tauri/target/release/bundle"
            } else {
              Write-Host "Found latest*.json:"
              $latest | ForEach-Object { $_.FullName }
              Write-Host ""
              Write-Host "Preview(first 30 lines) of each latest*.json:"
              foreach ($f in $latest) {
                Write-Host ("--- " + $f.FullName + " ---")
                Get-Content -Path $f.FullName -TotalCount 30
              }
            }
            $sigs = Get-ChildItem -Recurse "src-tauri/target/release/bundle" -File -Filter "*.sig" -ErrorAction SilentlyContinue
            Write-Host ""
            Write-Host ("Found .sig files: " + $sigs.Count)
            Write-Host ""
            Write-Host "=== Diagnose: nsis/msi/sig details ==="
            $nsisExe = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -File -Filter "*-setup.exe" -ErrorAction SilentlyContinue
            $nsisSig = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -File -Filter "*-setup.exe.sig" -ErrorAction SilentlyContinue
            $msi = Get-ChildItem -Recurse "src-tauri/target/release/bundle/msi" -File -Filter "*.msi" -ErrorAction SilentlyContinue
            $msiSig = Get-ChildItem -Recurse "src-tauri/target/release/bundle/msi" -File -Filter "*.msi.sig" -ErrorAction SilentlyContinue
            Write-Host ("NSIS installers: " + $nsisExe.Count)
            $nsisExe | ForEach-Object { Write-Host ("  NSIS EXE: " + $_.FullName) }
            Write-Host ("NSIS signatures: " + $nsisSig.Count)
            $nsisSig | ForEach-Object { Write-Host ("  NSIS SIG: " + $_.FullName) }
            Write-Host ("MSI installers: " + $msi.Count)
            $msi | ForEach-Object { Write-Host ("  MSI: " + $_.FullName) }
            Write-Host ("MSI signatures: " + $msiSig.Count)
            $msiSig | ForEach-Object { Write-Host ("  MSI SIG: " + $_.FullName) }
          }

      - name: Validate Windows updater artifacts (strict bundle + sig)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -File -Filter "*-setup.nsis.zip" -ErrorAction SilentlyContinue
          if ($bundle.Count -eq 0) {
            Write-Error "Strict mode failed: no Windows updater bundle (*-setup.nsis.zip) generated."
            exit 1
          }
          $missingSig = @()
          foreach ($file in $bundle) {
            if (-not (Test-Path ($file.FullName + ".sig"))) {
              $missingSig += $file.FullName
            }
          }
          if ($missingSig.Count -gt 0) {
            Write-Error ("Strict mode failed: missing .sig for Windows updater bundle(s): " + ($missingSig -join ", "))
            exit 1
          }
          Write-Host "Strict mode passed: Windows updater bundle + .sig found."

      - name: Validate macOS updater artifacts (strict bundle + sig)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          shopt -s globstar nullglob
          bundles=(src-tauri/target/release/bundle/**/*.app.tar.gz)
          if [ ${#bundles[@]} -eq 0 ]; then
            echo "::error::Strict mode failed: no macOS updater bundle (*.app.tar.gz) generated."
            exit 1
          fi
          missing=0
          for file in "${bundles[@]}"; do
            if [ ! -f "${file}.sig" ]; then
              echo "::error::Missing signature for macOS updater bundle: ${file}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Strict mode passed: macOS updater bundle + .sig found."

      - name: Validate Linux updater artifacts (strict bundle + sig)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          shopt -s globstar nullglob
          bundles=(src-tauri/target/release/bundle/**/*.AppImage.tar.gz)
          if [ ${#bundles[@]} -eq 0 ]; then
            echo "::error::Strict mode failed: no Linux updater bundle (*.AppImage.tar.gz) generated."
            exit 1
          fi
          missing=0
          for file in "${bundles[@]}"; do
            if [ ! -f "${file}.sig" ]; then
              echo "::error::Missing signature for Linux updater bundle: ${file}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Strict mode passed: Linux updater bundle + .sig found."

      - name: Create Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Compress-Archive -Path "src-tauri/target/release/rshell.exe" -DestinationPath "release-assets/rshell-windows-x64.zip" -Force

      - name: Create macOS zip
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          ditto -c -k --keepParent "src-tauri/target/release/rshell" "release-assets/rshell-macos-universal.zip"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ${{ matrix.bundle_pattern }}
            src-tauri/target/release/bundle/**/*.sig
            release-assets/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-and-upload-latest-json:
    name: Generate and upload latest.json
    runs-on: ubuntu-latest
    needs: build-and-upload
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Generate latest.json from release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}"
          release_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}")"

          get_asset_url() {
            local pattern="$1"
            echo "${release_json}" | jq -r --arg pattern "$pattern" '
              .assets
              | map(select(.name | test($pattern)))
              | first
              | .url // empty
            '
          }

          get_sig_content() {
            local asset_api_url="$1"
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "${asset_api_url}" | tr -d '\r\n'
          }

          windows_bundle_url="$(get_asset_url ".*-setup\\.nsis\\.zip$")"
          windows_sig_url="$(get_asset_url ".*-setup\\.nsis\\.zip\\.sig$")"
          mac_bundle_url="$(get_asset_url ".*\\.app\\.tar\\.gz$")"
          mac_sig_url="$(get_asset_url ".*\\.app\\.tar\\.gz\\.sig$")"
          linux_bundle_url="$(get_asset_url ".*\\.AppImage\\.tar\\.gz$")"
          linux_sig_url="$(get_asset_url ".*\\.AppImage\\.tar\\.gz\\.sig$")"

          for required in windows_bundle_url windows_sig_url mac_bundle_url mac_sig_url linux_bundle_url linux_sig_url; do
            if [ -z "${!required}" ]; then
              echo "::error::Missing required release asset for ${required}"
              exit 1
            fi
          done

          windows_sig="$(get_sig_content "${windows_sig_url}")"
          mac_sig="$(get_sig_content "${mac_sig_url}")"
          linux_sig="$(get_sig_content "${linux_sig_url}")"

          if [ -z "${windows_sig}" ] || [ -z "${mac_sig}" ] || [ -z "${linux_sig}" ]; then
            echo "::error::One or more signature files are empty."
            exit 1
          fi

          version="$(echo "${release_json}" | jq -r '.tag_name | sub("^v"; "")')"
          pub_date="$(echo "${release_json}" | jq -r '.published_at // .created_at')"
          notes="$(echo "${release_json}" | jq -r '.body // ""')"

          jq -n \
            --arg version "${version}" \
            --arg notes "${notes}" \
            --arg pub_date "${pub_date}" \
            --arg windows_url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/$(echo "${release_json}" | jq -r '.assets[] | select(.url == "'"${windows_bundle_url}"'") | .name')" \
            --arg windows_sig "${windows_sig}" \
            --arg mac_url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/$(echo "${release_json}" | jq -r '.assets[] | select(.url == "'"${mac_bundle_url}"'") | .name')" \
            --arg mac_sig "${mac_sig}" \
            --arg linux_url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/$(echo "${release_json}" | jq -r '.assets[] | select(.url == "'"${linux_bundle_url}"'") | .name')" \
            --arg linux_sig "${linux_sig}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { url: $windows_url, signature: $windows_sig },
                "darwin-x86_64": { url: $mac_url, signature: $mac_sig },
                "darwin-aarch64": { url: $mac_url, signature: $mac_sig },
                "linux-x86_64": { url: $linux_url, signature: $linux_sig }
              }
            }' > latest.json

          echo "==== latest.json diagnostics ===="
          echo "Path: latest.json"
          echo "Size(bytes): $(wc -c < latest.json)"
          echo "SHA256: $(sha256sum latest.json | awk '{print $1}')"
          echo "Preview(first 400 chars):"
          head -c 400 latest.json || true
          echo

      - name: Upload latest.json to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
