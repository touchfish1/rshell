name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle_pattern: |
              target/release/bundle/**/*.deb
              target/release/bundle/**/*.rpm
              target/release/bundle/**/*.AppImage
          - os: windows-latest
            bundle_pattern: |
              target/release/bundle/**/*.msi
              target/release/bundle/**/*.exe
          - os: macos-latest
            bundle_pattern: |
              target/release/bundle/**/*.dmg
              target/release/bundle/**/*.pkg
              target/release/bundle/**/*.app.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src-tauri/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install UI dependencies
        run: npm ci
        working-directory: src-tauri/ui

      - name: Build Tauri bundles
        run: npx @tauri-apps/cli@2 build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Compress-Archive -Path "target/release/rshell.exe" -DestinationPath "release-assets/rshell-windows-x64.zip" -Force

      - name: Create macOS zip
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          ditto -c -k --keepParent "target/release/rshell" "release-assets/rshell-macos-universal.zip"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ${{ matrix.bundle_pattern }}
            target/release/bundle/**/*.sig
            release-assets/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect updater manifest files
        if: runner.os == 'Windows'
        shell: bash
        run: |
          shopt -s globstar nullglob
          mkdir -p updater-manifest
          found=0
          for file in target/release/bundle/**/latest*.json; do
            found=1
            base="$(basename "$file")"
            cp "$file" "updater-manifest/${base}"
            if [ -f "${file}.sig" ]; then
              cp "${file}.sig" "updater-manifest/${base}.sig"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No updater manifest generated on ${{ runner.os }}"
          fi

      - name: Upload updater manifest artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest
          path: updater-manifest/*
          if-no-files-found: ignore

  upload-updater-manifest:
    name: Upload latest.json to Release
    runs-on: ubuntu-latest
    needs: build-and-upload
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download updater manifest artifacts
        uses: actions/download-artifact@v4
        with:
          name: updater-manifest
          path: updater-manifest

      - name: Ensure updater manifest exists
        shell: bash
        run: |
          shopt -s nullglob
          files=(updater-manifest/*latest*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No latest.json artifact found from build jobs."
            exit 1
          fi
          printf 'Found updater manifests:\n%s\n' "${files[@]}"

      - name: Log latest.json path and summary
        shell: bash
        run: |
          shopt -s nullglob
          files=(updater-manifest/*latest*.json)
          echo "==== latest.json diagnostics ===="
          for file in "${files[@]}"; do
            echo "Path: $file"
            echo "Size(bytes): $(wc -c < "$file")"
            echo "SHA256: $(sha256sum "$file" | awk '{print $1}')"
            echo "Preview(first 400 chars):"
            head -c 400 "$file" || true
            echo
            echo "----"
          done

      - name: Upload updater manifest to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            updater-manifest/*latest*.json
            updater-manifest/*latest*.json.sig
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
