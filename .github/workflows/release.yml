name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle_pattern: |
              target/release/bundle/**/*.deb
              target/release/bundle/**/*.rpm
              target/release/bundle/**/*.AppImage
          - os: windows-latest
            bundle_pattern: |
              target/release/bundle/**/*.msi
              target/release/bundle/**/*.exe
          - os: macos-latest
            bundle_pattern: |
              target/release/bundle/**/*.dmg
              target/release/bundle/**/*.pkg
              target/release/bundle/**/*.app.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build Tauri bundles
        run: npx @tauri-apps/cli@2 build

      - name: Create Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Compress-Archive -Path "target/release/rshell.exe" -DestinationPath "release-assets/rshell-windows-x64.zip" -Force

      - name: Create macOS zip
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          ditto -c -k --keepParent "target/release/rshell" "release-assets/rshell-macos-universal.zip"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ${{ matrix.bundle_pattern }}
            release-assets/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
